# CiteSite — Cloudflare Workers configuration
# This file is used when deploying Workers (audit API, payments, newsletter).
# Pages deployment is configured separately in the Cloudflare dashboard.

name = "citesite"
main = "workers/audit-api/index.js"
compatibility_date = "2026-04-24"

[vars]
ANTHROPIC_MODEL = "claude-sonnet-4-20250514"

[[d1_databases]]
binding = "DB"
database_name = "citesite-db"
database_id = "c3773f9a-5b71-4095-9b48-2131eea61eaf"

[[kv_namespaces]]
binding = "NEWSLETTER_KV"
id = "5523ef7a6c3e426db838d2683b0f2b86"

# Uncomment after enabling R2 in dashboard:
# [[r2_buckets]]
# binding = "REPORTS_BUCKET"
# bucket_name = "citesite-reports"